
services:
  web-app:
    build: .
    tty: true
    ports:
      - "8003:8000"
    env_file:
      .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/aviacassa
    
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=demo
      - POSTGRES_USER=ziyodev
      - POSTGRES_PASSWORD=ziyodev22
    env_file:
      - .env
    volumes:
      - pgdata_demo:/var/lib/postgresql/data
    ports:
      - "5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziyodev -d demo"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery-worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/aviacassa

  celery-beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      .env
    depends_on:
      - redis
      - celery-worker
    volumes:
      - ./src:/aviacassa

  redis:
    image: redis:7

volumes:
  pgdata_demo: